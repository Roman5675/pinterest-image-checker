<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Image Checker</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:0 auto;
    padding:20px;
    background:#fafafa;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

#dropZone{
    border:3px dashed #999;
    border-radius:12px;
    padding:50px 20px;
    text-align:center;
    cursor:pointer;
    margin-bottom:15px;
    transition:0.2s;
    background:white;
}

#dropZone:hover{
    background:#f5f5f5;
}

#dropZone.drag{
    background:#ececec;
}

#fileCount{
    text-align:center;
    margin-bottom:20px;
    color:#666;
    font-size:14px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
    justify-content: center;
}

input[type="text"]{
    flex:1;
    min-width:220px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.check-btn{
    background:#1976d2;
    color:white;
}

.save-btn{
    background:#2e7d32;
    color:white;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,
td{
    border:1px solid #ddd;
    padding:12px;
}

th{
    background:#f4f4f4;
}

.good{
    color:green;
    font-weight:bold;
}

.bad{
    color:red;
    font-weight:bold;
}

.info{
    margin-top:20px;
    padding:12px;
    border-radius:8px;
    background:white;
    border:1px solid #eee;
}

.results{
    display:grid;
    grid-template-columns:
        repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.card-body{
    padding:15px;
}

.card-name{
    font-size:14px;
    word-break:break-word;
    margin-bottom:10px;
}

.good{
    color:green;
    font-weight:bold;
}

.bad{
    color:red;
    font-weight:bold;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    #dropZone{
        padding:35px 15px;
    }

    .controls{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    table{
        font-size:14px;
    }
}

</style>

</head>

<body>

<h1>📌 Pinterest Image Checker</h1>

<input
    type="file"
    id="files"
    multiple
    hidden
>

<div id="dropZone">
    📂 Перетащите изображения сюда<br><br>
    или нажмите для выбора файлов
</div>

<div id="fileCount">
    Файлы не выбраны
</div>

<div class="controls">


    <button
        class="check-btn"
        onclick="checkFiles()"
    >
        Проверить
    </button>

    <button
        class="save-btn"
        onclick="saveNewFiles()"
    >
        Добавить новые
    </button>

</div>

<div id="results" class="results"></div>

<!-- Supabase оставляем глобально (работает) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- app.js подключаем как модуль -->
<script type="module" src="app.js"></script>

</body>
</html>
