<!DOCTYPE html>

<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Image Checker</title>

<style>

body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px;
}

h1{
    text-align:center;
}

#dropZone{
    border: 3px dashed #999;
    border-radius: 12px;
    padding: 50px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
    transition: 0.2s;
}

#dropZone:hover{
    background:#f5f5f5;
}

#dropZone.drag{
    background:#ececec;
}

input[type="text"]{
    padding:10px;
    width:250px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    margin-right:10px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#f4f4f4;
}

.good{
    color:green;
    font-weight:bold;
}

.bad{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Pinterest Image Checker</h1>

<input
 type="file"
 id="files"
 multiple
 hidden>

<div id="dropZone">
    📂 Перетащите изображения сюда<br><br>
    или нажмите для выбора файлов
</div>

<div>
    <input
        type="text"
        id="user"
        placeholder="Ваше имя">
</div>

<br>

<button onclick="checkFiles()">
    Проверить
</button>

<button onclick="saveNewFiles()">
    Добавить новые
</button>

<table id="results">
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
